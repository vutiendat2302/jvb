<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/bootstrap-style.css" />
  </head>
  <body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="text-center">
        <div id="dashboard" class="dashboard-box d-none">
          <h2>Đăng nhập thành công</h2>
          <p>Chào mừng Admin đã quay lại hệ thống</p>
          <button id="logoutBtn" class="btn btn-danger btn-lg">Đăng xuất</button>
        </div>

        <button id="openLoginBtn" class="btn btn-success btn-lg ">
          Đăng nhập hệ thống
        </button>
      </div>
    </div>

    <div class="modal fade" id="loginModal">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-10 shadow">
          <div class="modal-header border-0">
            <h5 class="modal-title w-100 text-center">Member Login</h5>
            <button type="button" class="btn-close" id="closeModalBtn"></button>
          </div>

          <div class="modal-body">
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                <input type="text" id="username" class="form-control form-control-lg" placeholder="Username" />
            </div>
            <p id="userError" class="error-message"></p>

            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Password" />
            </div>
            <p id="passError" class="error-message"></p>

            <button id="loginBtn" class="btn btn-success w-100 btn-lg">Login</button>
          </div>

          <div class="modal-footer border-0 justify-content-center bg-light">
            <button type="button" class="btn btn-link text-secondary">Forgot Password?</button>
            <button type="button" class="btn btn-link text-secondary">Create new account</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="bootstrap-index.js"></script>
  </body>
</html>
