<!DOCTYPE html >
<html lang="vi">
    <head>
        <Title>login</Title>
        <meta name="viewport" content="width=device-width, initial-scale = 1.0">
        <link rel = "stylesheet" href="style.css">
        
    </head>

    <body>
        <button id="openLoginBtn" class="open-btn">
            Đăng nhập hệ thống 
        </button>

        <div id = "loginModal" class="modal">
            <div class="login-box">
                <button id="closeModalBtn" class="close-btn">&times;</button>
                <h2>Member Login</h2>
            

                <div>
                    <input type="text" id="username" placeholder="Username" class="input">
                </div>

                <div>
                    <input type="password" id="password" placeholder="Password" class="input">
                </div>

                <button class="login-btn" id = "login-btn">
                    Login 
                </button>

                <div>
                    <button class="forgot-btn">
                        Forgot Password?
                    </button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>

    <!--Tạo Login form sử dụng HTMS, CSS JS thuần
    3. Khi ấn login sẽ có biểu tượng Loading thay thế chữ login. Tài khoản login mặc địch admin/admin
    - Không nhập username/password hiện thông báo "Vui lòng nhập đầy đủ thông tin" dưới ô input
    - Nhập username/password sai (khác admin/admin) thông báo hiện dòng chữ đỏ: "Tài khoản hoặc mật khẩu không đúng" dưới input của pasword.
    - Nhập username/password đúng (admin/admin) đóng form, button "Đăng nhập hệ thống" hiển thị thành "Đăng nhập thành công"
-->
    
</html>
