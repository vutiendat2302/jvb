<!DOCTYPE html >
<html lang="vi">
    <head>
        <Title>login</Title>
        <meta name="viewport" content="width=device-width, initial-scale = 1.0">
        <link rel = "stylesheet" href="css/style.css">
        <link rel="stylesheet" href = "css/icon.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>

        <div id = "dashboard" class="dashboard-box">
            <h2>Dang nhap thanh cong</h2>
            <p> Chao mung Admin da quay lai he thong</p>
            <button id = "logoutBtn" class="logout-btn">Dang xuat</button>

        </div>

        <button id="openLoginBtn" class="open-btn">
            Đăng nhập hệ thống 
        </button>

        <div id = "loginModal" class="modal">
            <div class="login-box">
                <button id="closeModalBtn" class="close-btn">&times;</button>
                <h2 style="margin-top: 10px;">Member Login</h2>
            

                <div class="login-btn-box">
                    <!-- <i class="fa-solid fa-user"></i> -->
                    <img src ="pic/user-solid-full.svg" class="input-icon">
                    <input type="text" id="username" placeholder="Username" class="input">
                </div>
                <p id="userError" class="error-message"></p>

                <div class="login-btn-box">
                    
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" placeholder="Password" class="input">
                </div>
                <p id="passError" class="error-message"></p>

                <div class="login-btn-box">
                    <button class="login-btn" id = "loginBtn">
                        Login 
                    </button>
                </div>
                

                <div class="forgot-div">
                    <button class="forgot-btn">
                        Forgot Password?
                    </button>
                    <button class="forgot-btn">
                        Create new account 
                    </button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>

    <!--
    - Loading: không ở giữa
    - Create new account 
    - Submin or I already have an account 
    -->

</html>
