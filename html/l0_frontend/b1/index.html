<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Bài 1</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            margin: 0; 
        }

        .a1 {
            width: 992px;
            height: 1992px;
            border: 4px solid red;
            position: relative;
            z-index: 0;
        }
        .title{
            position: absolute;
            top: 0;
            left: 0;
        }

        .a2 {
            width: 492px;
            height: 192px;
            border: 4px solid green;
            position: fixed;
            z-index: 1000;
        }

        .a3 {
            width: 492px;
            height: 192px;
            border: 4px solid indigo;
            position: fixed; 
            z-index: 1000;
            bottom: 0;
        }

        .a4 {
            width: 792px;
            border: 4px solid blue;
            position: relative;
            margin-top: 196px; 
            
            height: calc(100vh - 200px - 200px - 8px - 16px + 1px);
        }

        .a5 {
            margin-left: 200px;
            border: 4px solid blueviolet;
            width: 312px;
            height: 212px;
            position: sticky;
            top: calc(50vh - 212px/2);
            z-index: 2;
        
        }
        
        .a6 {
            width: 192px;
            height: 112px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid greenyellow;
            z-index: 3;
            position: absolute;
        }

        @media (max-width: 780px) {
            .a1 { width: calc(992px / 2); }
            .a2 { width: calc(492px / 2); }
            .a3 { width: calc(492px / 2); }
            .a4 { width: calc(792px / 2); }
            .a5 { width: calc(312px / 2); }
        }
    </style>
    
</head>


<body>

    <div class="a2"><p class ="title">A2</p></div>
    
    <div class="a3"> <p class="title"> A3</p></div>

    <script>
            function fixA4Height() {
            const a2 = document.querySelector('.a2');
            const a3 = document.querySelector('.a3');
            const a4 = document.querySelector('.a4');
            
            const a2Bottom = a2.getBoundingClientRect().bottom;
            const a3Top = a3.getBoundingClientRect().top;
            
            a4.style.height = (a3Top - a2Bottom - 8) + 'px';
        }

        document.addEventListener('DOMContentLoaded', fixA4Height);
        window.addEventListener('resize', fixA4Height);
    </script>
    
    <div class="a1"> <p class="title">A1</p>
        <div class="a4"> <p class="title">A4</p>
            <div class="a6"><p class="title">A6</p></div>
            <div class="a5"><p class="title"> A5</p></div>
            
        </div>
    </div>
    <script>

        const a4 = document.querySelector('.a4');
        const a3 = document.querySelector('.a3');
        const a4rect = a4.getBoundingClientRect();
        const a3rect = a3.getBoundingClientRect();
        console.log('lệch:', a3rect.top - a4rect.bottom, 'px'); 
    </script>
</body>
</html>
